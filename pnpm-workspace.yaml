packages:
  - 'packages/*'
  - 'apps/*'

overrides:
  vite: ^8.0.13

allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  core-js-pure: true
  esbuild: true
  maplibre-gl: true
  sharp: true
  vue-demi: true
  workerd: true

# Catalogs centralize dependency versions across the monorepo.
# Sub-packages reference these with `catalog:` (default) or `catalog:<name>`.
# Requires pnpm v9.5+ (this repo pins pnpm v11).
catalogs:
  default:
    maplibre-gl: ^5.24.0
    oxfmt: ^0.49.0
    oxlint: ^1.64.0
    typescript: ^6.0.3
    vue: ^3.5.34

  pkg:mapcn-vue:
